<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">SignalTrace logo</title>
  <desc id="logoDesc">A neon telemetry badge with waveform, trace nodes, and a scanning ring.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="14" x2="110" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1131"/>
      <stop offset="0.55" stop-color="#0c1020"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="stroke" x1="24" y1="24" x2="104" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff4ad2"/>
      <stop offset="1" stop-color="#59f5ff"/>
    </linearGradient>
    <linearGradient id="wave" x1="28" y1="64" x2="100" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c8ff5c"/>
      <stop offset="0.45" stop-color="#59f5ff"/>
      <stop offset="1" stop-color="#ff4ad2"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="112" height="112" rx="30" fill="url(#bg)"/>
  <rect x="13" y="13" width="102" height="102" rx="25" fill="none" stroke="url(#stroke)" stroke-width="3.5"/>
  <path d="M28 92V37" fill="none" stroke="#2f3754" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M28 92H95" fill="none" stroke="#2f3754" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="84" cy="44" r="23" fill="none" stroke="#59f5ff" stroke-opacity="0.25" stroke-width="5"/>
  <circle cx="84" cy="44" r="23" fill="none" stroke="#59f5ff" stroke-width="2.5" stroke-dasharray="7 8" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M34 75h13l8-16 9 23 10-28 7 13h14" fill="none" stroke="url(#wave)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="34" cy="75" r="4.5" fill="#c8ff5c"/>
  <circle cx="55" cy="59" r="4.5" fill="#59f5ff"/>
  <circle cx="64" cy="82" r="4.5" fill="#59f5ff"/>
  <circle cx="74" cy="54" r="4.5" fill="#ff4ad2"/>
  <circle cx="95" cy="67" r="4.5" fill="#ff4ad2"/>
  <path d="M74 44h20" fill="none" stroke="#59f5ff" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M84 34v20" fill="none" stroke="#59f5ff" stroke-width="3.5" stroke-linecap="round"/>
</svg>
