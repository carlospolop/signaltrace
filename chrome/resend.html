<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<title>SignalTrace Replay Console</title>
	<link rel="icon" href="icons/icon-32.png" />
	<script src="resend.js"></script>
	<style>
		:root { --bg0: #05030b; --bg1: #120c1d; --bg2: #0b121d; --cyan: #57f4ff; --pink: #ff46cd; --lime: #c7ff5f; --amber: #ffb74d; --text: #edf7ff; --muted: #8aa2ba; --line: rgba(87,244,255,0.18); --danger: #ff6d89; }
		body { margin: 0; font: 14px/1.45 "SFMono-Regular", "Menlo", "Consolas", monospace; color: var(--text); background: radial-gradient(circle at top left, rgba(255,70,205,0.14), transparent 24%), radial-gradient(circle at 80% 20%, rgba(87,244,255,0.12), transparent 22%), linear-gradient(160deg, var(--bg0), var(--bg1) 55%, var(--bg2)); }
		.shell { max-width: 1120px; margin: 0 auto; padding: 24px; position: relative; }
		.shell:before { content: ""; position: fixed; inset: 0; background-image: linear-gradient(rgba(87,244,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(87,244,255,0.04) 1px, transparent 1px); background-size: 26px 26px; pointer-events: none; }
		.hero, .panel { position: relative; z-index: 1; background: linear-gradient(180deg, rgba(12,15,29,0.96), rgba(7,10,19,0.96)); border: 1px solid var(--line); border-radius: 16px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 16px 40px rgba(0,0,0,0.34); }
		.hero { padding: 18px; margin-bottom: 16px; border-color: rgba(255,70,205,0.26); }
		.hero-brand { display: flex; gap: 14px; align-items: center; }
		.hero-brand img { width: 56px; height: 56px; flex: 0 0 auto; filter: drop-shadow(0 0 18px rgba(87,244,255,0.18)); }
		.hero b { display: block; color: var(--cyan); font-size: 28px; letter-spacing: 0.14em; text-transform: uppercase; }
		.hero span { display: block; margin-top: 4px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; font-size: 12px; }
		.grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; }
		.panel { padding: 16px; }
		.badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
		.badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.08em; }
		.badge.pm { color: var(--lime); background: rgba(199,255,95,0.14); border: 1px solid rgba(199,255,95,0.18); }
		.badge.ws { color: var(--cyan); background: rgba(87,244,255,0.14); border: 1px solid rgba(87,244,255,0.18); }
		.badge.http { color: var(--amber); background: rgba(255,183,77,0.14); border: 1px solid rgba(255,183,77,0.18); }
		.row { display: grid; gap: 10px; margin-bottom: 12px; }
		label { display: block; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
		input, select, textarea { width: 100%; box-sizing: border-box; border: 1px solid rgba(87,244,255,0.22); border-radius: 10px; background: rgba(3, 8, 16, 0.96); color: var(--text); padding: 10px 12px; font: inherit; }
		input:focus, select:focus, textarea:focus { outline: none; border-color: var(--pink); box-shadow: 0 0 0 1px rgba(255,70,205,0.3), 0 0 20px rgba(255,70,205,0.12); }
		textarea { min-height: 220px; resize: vertical; }
		textarea.compact { min-height: 120px; }
		button { border: 1px solid rgba(87,244,255,0.28); background: linear-gradient(135deg, rgba(255,70,205,0.16), rgba(87,244,255,0.18)); color: var(--text); padding: 10px 14px; border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; }
		button.secondary { background: rgba(5, 8, 18, 0.92); color: var(--cyan); }
		button:disabled { opacity: 0.45; cursor: default; }
		.actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
		pre, code { display: block; white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word; }
		pre { margin: 0; background: rgba(2, 5, 12, 0.94); border: 1px solid rgba(87,244,255,0.14); border-radius: 10px; padding: 12px; color: #dffaff; max-height: 360px; overflow: auto; }
		.meta { color: var(--muted); margin: 10px 0 0; }
		.status { margin-top: 14px; padding: 12px; border-radius: 12px; border: 1px solid rgba(87,244,255,0.14); background: rgba(3, 8, 16, 0.9); white-space: pre-wrap; }
		.status.error { border-color: rgba(255,109,137,0.4); color: #ffd7df; }
		.status.ok { border-color: rgba(199,255,95,0.28); color: #e9ffd1; }
		.helper { color: var(--muted); font-size: 12px; margin-top: 8px; }
		.hidden { display: none; }
		@media (max-width: 960px) { .grid { grid-template-columns: 1fr; } }
	</style>
</head>
<body>
	<div class="shell">
		<div class="hero">
			<div class="hero-brand">
				<img src="icons/logo.svg" alt="SignalTrace logo" />
				<div>
					<b>Replay Console</b>
					<span>edit, reshape, and resend captured traffic into the original tab context</span>
				</div>
			</div>
		</div>
		<div class="grid">
			<div class="panel">
				<div class="badges">
					<span class="badge" id="kind-badge">Unknown</span>
					<span class="badge" id="tab-badge">Tab ?</span>
				</div>
				<div class="row">
					<div>
						<label for="draft-kind">Channel</label>
						<input id="draft-kind" readonly />
					</div>
					<div>
						<label for="draft-url">Target / URL</label>
						<input id="draft-url" />
					</div>
				</div>
				<div class="row" id="http-method-row">
					<div>
						<label for="draft-method">HTTP Method</label>
						<input id="draft-method" />
					</div>
				</div>
				<div class="row" id="pm-target-origin-row">
					<div>
						<label for="draft-target-origin">Target Origin</label>
						<input id="draft-target-origin" />
					</div>
				</div>
				<div class="row" id="headers-row">
					<div>
						<label for="draft-headers">Headers JSON</label>
						<textarea id="draft-headers" class="compact"></textarea>
						<div class="helper">Used for HTTP replay. Keep this valid JSON.</div>
					</div>
				</div>
				<div class="row">
					<div>
						<label for="draft-payload">Payload / Body</label>
						<textarea id="draft-payload"></textarea>
					</div>
				</div>
				<div class="actions">
					<button id="resend">Resend</button>
					<button id="reload" class="secondary">Reload Draft</button>
				</div>
				<div id="status" class="status hidden"></div>
			</div>
			<div class="panel">
				<label>Original Capture</label>
				<pre id="original"></pre>
				<div class="meta" id="original-meta"></div>
			</div>
		</div>
	</div>
</body>
</html>
